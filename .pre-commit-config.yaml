# Code style checks for this repo (Python). Excludes sempipes/ (read-only symlink).
# Install: poetry run pre-commit install
# Run manually: poetry run pre-commit run --all-files
default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^demo/
      - id: ruff-format
        files: ^demo/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        args: [demo/backend]
        files: ^demo/backend/
        pass_filenames: false
        additional_dependencies:
          - fastapi>=0.109.0
          - pydantic>=2.5.0
          - httpx>=0.26.0
